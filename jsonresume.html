<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tushar Neje — Resume (JSON)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <style>
    :root{--paper:#ffffff;--page-bg:#f3f4f6;--text:#0b1720;--muted:#55606a;--accent:#111827}
    html,body{height:100%;margin:0;background:var(--page-bg);color:var(--text);font-family:Inter,system-ui,Arial,sans-serif}
    .paper{max-width:800px;margin:28px auto;padding:36px;background:var(--paper);box-shadow:0 10px 30px rgba(16,24,40,0.08);border-radius:6px;border:1px solid rgba(15,23,42,0.06)}
    header{display:flex;align-items:flex-start;gap:18px}
    .meta{flex:1}
    .name{font-family:Merriweather,serif;font-size:28px;margin:0 0 4px}
    .title{font-weight:600;color:var(--muted);margin-bottom:6px}
    .contact{font-size:13px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px}
    .avatar{width:96px;height:96px;border-radius:6px;object-fit:cover;flex-shrink:0}

    .section{margin-top:20px}
    .section h2{font-size:13px;letter-spacing:0.12em;text-transform:uppercase;margin:0 0 10px;color:var(--accent);font-weight:700}
    .job{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}
    .job .left{flex:1}
    .job .right{min-width:120px;text-align:right;color:var(--muted);font-size:13px}
    .muted{color:var(--muted)}
    ul{margin:6px 0 12px 18px}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{background:#eef2f6;padding:6px 8px;border-radius:6px;font-size:13px;color:var(--text)}
    .tech{font-size:12px;color:var(--muted);margin-top:6px}

    .actions{display:flex;justify-content:flex-end;gap:10px;margin-bottom:14px}
    .btn{background:#111827;color:#fff;padding:8px 12px;border-radius:6px;text-decoration:none;font-size:13px}
    .btn-secondary{background:transparent;color:var(--muted);border:1px solid rgba(0,0,0,0.06)}

    /* Print friendly */
    @media print{
      body{background:white}
      .paper{box-shadow:none;border:none;margin:6mm auto;padding:18mm}
      .actions{display:none}
    }

    @media (max-width:720px){.paper{padding:20px}.avatar{width:78px;height:78px}}
  </style>
</head>
<body>
  <div class="paper" id="paper">
    <div class="actions">
      <a id="download-resume" class="btn" href="#" download>Download PDF</a>
      <a id="print-resume" class="btn btn-secondary" href="#" onclick="window.print();return false;">Print</a>
    </div>

    <header>
      <div class="meta">
        <h1 class="name" id="name">Loading…</h1>
        <div class="title" id="title">Full-Stack Developer & AI Builder</div>
        <div class="contact" id="contact-line"></div>
      </div>
      <img id="avatar" class="avatar" src="assets/me.webp" alt="avatar"/>
    </header>

    <div id="content">
      <!-- JSON-rendered resume goes here -->
    </div>
  </div>

  <script>
    // Helper to create element
    function el(tag, attrs={}, children=[]){
      const node = document.createElement(tag);
      for(const k in attrs){
        if(k==='html') node.innerHTML = attrs[k]; else node.setAttribute(k, attrs[k]);
      }
      (Array.isArray(children)?children:[children]).forEach(c=>{ if(!c) return; if(typeof c==='string') node.appendChild(document.createTextNode(c)); else node.appendChild(c) });
      return node;
    }

    function joinText(arr, sep=', '){ return (arr||[]).filter(Boolean).join(sep); }

    async function load(){
      try{
        const res = await fetch('data/resume.json');
        if(!res.ok) throw new Error('Could not fetch resume.json');
        const data = await res.json();
        render(data);
      }catch(e){
        document.getElementById('content').innerHTML = '<p style="color:#c33">Failed to load resume.json — '+e.message+'</p>'
        console.error(e)
      }
    }

    function render(data){
      const p = document.getElementById('paper');
      const name = data.personal?.name || '';
      const title = data.personal?.title || '';
      document.getElementById('name').textContent = name;
      document.getElementById('title').textContent = title + (data.personal?.tagline?(' — '+data.personal.tagline):'');
      const avatar = document.getElementById('avatar');
      if(data.personal?.avatar) avatar.src = data.personal.avatar;

      // contact
      const contactLine = document.getElementById('contact-line');
      contactLine.innerHTML = '';
      const contactItems = [];
      if(data.personal?.location) contactItems.push(el('span',{},[data.personal.location]));
      if(data.personal?.phone) contactItems.push(el('a',{href:'tel:'+data.personal.phone},[data.personal.phone]));
      if(data.personal?.email) contactItems.push(el('a',{href:'mailto:'+data.personal.email},[data.personal.email]));
      if(data.personal?.social){
        data.personal.social.forEach(s=>{
          if(s.url) contactItems.push(el('a',{href:s.url,target:'_blank',rel:'noopener'},[s.platform]));
        })
      }
      contactItems.forEach(i=>contactLine.appendChild(i));

      // download link
      const dl = document.getElementById('download-resume');
      if(data.personal?.resume){ dl.href = data.personal.resume; }

      const content = document.getElementById('content');
      content.innerHTML = '';

      // Summary
      if(data.personal?.bio || data.personal?.bio_extended){
        const sec = el('section',{class:'section'});
        sec.appendChild(el('h2',{},['Summary']));
        const sum = el('p',{class:'muted',html: data.personal.bio_extended || data.personal.bio || ''});
        sec.appendChild(sum);
        content.appendChild(sec);
      }

      // Experience: Professional, Leadership, Awards
      if(data.experience){
        const sec = el('section',{class:'section'});
        sec.appendChild(el('h2',{},['Experience']));

        // professional
        if(Array.isArray(data.experience.professional)){
          data.experience.professional.forEach(job=>{
            const jobEl = el('div',{class:'job'});
            const left = el('div',{class:'left'});
            left.appendChild(el('div',{style:'font-weight:600'},[job.role + (job.organization?(' — '+job.organization):'')]));
            if(job.location) left.appendChild(el('div',{class:'muted'},[job.location]));
            if(job.description) left.appendChild(el('div',{class:'muted',style:'margin-top:6px'},[job.description]));
            jobEl.appendChild(left);
            jobEl.appendChild(el('div',{class:'right'},[job.period || (job.year_start? (job.year_start + (job.year_end?(' – '+job.year_end):'') ) : '')]));
            sec.appendChild(jobEl);
            if(job.highlights && job.highlights.length){
              const ul = el('ul'); job.highlights.forEach(h=>ul.appendChild(el('li',{},[h]))); sec.appendChild(ul);
            }
          });
        }

        // leadership
        if(Array.isArray(data.experience.leadership)){
          data.experience.leadership.forEach(job=>{
            const jobEl = el('div',{class:'job'});
            const left = el('div',{class:'left'});
            left.appendChild(el('div',{style:'font-weight:600'},[job.role + (job.organization?(' — '+job.organization):'')]));
            if(job.location) left.appendChild(el('div',{class:'muted'},[job.location]));
            if(job.description) left.appendChild(el('div',{class:'muted',style:'margin-top:6px'},[job.description]));
            jobEl.appendChild(left);
            jobEl.appendChild(el('div',{class:'right'},[job.period || '']));
            sec.appendChild(jobEl);
            if(job.highlights && job.highlights.length){ const ul = el('ul'); job.highlights.forEach(h=>ul.appendChild(el('li',{},[h]))); sec.appendChild(ul); }
          });
        }

        // awards
        if(Array.isArray(data.experience.awards) && data.experience.awards.length){
          sec.appendChild(el('div',{style:'margin-top:8px;font-weight:600'},['Awards & Achievements']));
          const ul = el('ul'); data.experience.awards.forEach(a=>ul.appendChild(el('li',{},[a.title + (a.organization?(' — '+a.organization):'') + (a.year?(' ('+a.year+')'):'')]))); sec.appendChild(ul);
        }

        content.appendChild(sec);
      }

      // Education (separate section)
      if(data.experience && Array.isArray(data.experience.education)){
        const sec = el('section',{class:'section'});
        sec.appendChild(el('h2',{},['Education']));
        data.experience.education.forEach(e=>{
          const row = el('div',{class:'job'});
          const left = el('div',{class:'left'});
          left.appendChild(el('div',{style:'font-weight:700'},[e.degree + (e.field?(' — '+e.field):'')]));
          left.appendChild(el('div',{class:'muted'},[e.institution + (e.location?(' • '+e.location):'')]));
          if(e.description) left.appendChild(el('div',{class:'muted',style:'margin-top:6px'},[e.description]));
          row.appendChild(left);
          row.appendChild(el('div',{class:'right'},[e.period || '']));
          sec.appendChild(row);
          if(e.score) sec.appendChild(el('div',{class:'muted'},['Score: '+e.score]));
        });
        content.appendChild(sec);
      }

      // Projects
      if(Array.isArray(data.projects) && data.projects.length){
        const sec = el('section',{class:'section'});
        sec.appendChild(el('h2',{},['Projects']));
        data.projects.forEach(p=>{
          const row = el('div',{style:'margin-bottom:12px'});
          row.appendChild(el('div',{style:'font-weight:700'},[p.title]));
          if(p.tag) row.appendChild(el('div',{class:'muted'},[p.tag]));
          if(p.description) row.appendChild(el('div',{style:'margin-top:6px'},[el('div',{class:'muted'},[p.description])]));
          if(Array.isArray(p.tech_stack) && p.tech_stack.length) row.appendChild(el('div',{class:'tech'},['Tech: '+p.tech_stack.join(', ')]));
          const links = [];
          if(p.github_url) links.push('<a href="'+p.github_url+'" target="_blank" rel="noopener">GitHub</a>');
          if(p.live_url) links.push('<a href="'+p.live_url+'" target="_blank" rel="noopener">Live</a>');
          if(p.linkedin_post) links.push('<a href="'+p.linkedin_post+'" target="_blank" rel="noopener">Post</a>');
          if(links.length) row.appendChild(el('div',{class:'muted',html:links.join(' · ')}));
          sec.appendChild(row);
        });
        content.appendChild(sec);
      }

      // Skills
      if(data.skills && Array.isArray(data.skills.categories)){
        const sec = el('section',{class:'section'});
        sec.appendChild(el('h2',{},['Skills']));
        data.skills.categories.forEach(cat=>{
          sec.appendChild(el('div',{style:'font-weight:600;margin-top:8px'},[cat.label]));
          const chips = el('div',{class:'chips'});
          (cat.skills||[]).forEach(s=>chips.appendChild(el('div',{class:'chip'},[s.name + (s.proficiency?(' — '+s.proficiency+'%'):'')])));
          sec.appendChild(chips);
        });
        content.appendChild(sec);
      }

      // Certificates
      if(Array.isArray(data.certificates) && data.certificates.length){
        const sec = el('section',{class:'section'});
        sec.appendChild(el('h2',{},['Certificates']));
        const ul = el('ul');
        data.certificates.forEach(c=> ul.appendChild(el('li',{},[c.name + (c.issuer?(' — '+c.issuer):'') + (c.date?(' ('+c.date+')'):'')])));
        sec.appendChild(ul);
        content.appendChild(sec);
      }

      // Research
      if(Array.isArray(data.research) && data.research.length){
        const sec = el('section',{class:'section'});
        sec.appendChild(el('h2',{},['Research & Publications']));
        data.research.forEach(r=>{
          const row = el('div',{},[]);
          row.appendChild(el('div',{style:'font-weight:700'},[r.title + (r.year?(' ('+r.year+')'):'')]));
          row.appendChild(el('div',{class:'muted'},[joinText(r.authors||[],' , ') + (r.conference?(' — '+r.conference):'')]));
          if(r.pdf_url) row.appendChild(el('div',{class:'muted',html:'<a href="'+r.pdf_url+'" target="_blank" rel="noopener">PDF</a>'}));
          sec.appendChild(row);
        });
        content.appendChild(sec);
      }

      // Activities & Hackathons
      if(data.activities){
        const sec = el('section',{class:'section'});
        sec.appendChild(el('h2',{},['Activities & Hackathons']));
        if(Array.isArray(data.activities.hackathons)){
          const ul = el('ul');
          data.activities.hackathons.forEach(h=> ul.appendChild(el('li',{},[h.name + (h.organization?(' — '+h.organization):'') + (h.year?(' ('+h.year+')'):'') + (h.result?(' — '+h.result):'')])));
          sec.appendChild(ul);
        }
        if(Array.isArray(data.activities.extracurricular)){
          const ul = el('ul');
          data.activities.extracurricular.forEach(x=> ul.appendChild(el('li',{},[x.name + (x.description?(' — '+x.description):'')])));
          sec.appendChild(ul);
        }
        content.appendChild(sec);
      }

      // Languages
      if(data.personal && Array.isArray(data.personal.languages)){
        const sec = el('section',{class:'section'});
        sec.appendChild(el('h2',{},['Languages']));
        sec.appendChild(el('div',{class:'muted'},[data.personal.languages.join(', ')]));
        content.appendChild(sec);
      }

      // Footer note
      const foot = el('div',{class:'section',style:'margin-top:22px;border-top:1px solid rgba(0,0,0,0.06);padding-top:12px;font-size:12px;color:var(--muted)'},['Generated from resume.json — last updated: ' + (new Date().toLocaleDateString())]);
      content.appendChild(foot);
    }

    load();

    // --- PDF generation from rendered resume ---
    function waitForImages(root){
      const imgs = Array.from((root || document).querySelectorAll('img'));
      return Promise.all(imgs.map(img=> img.complete ? Promise.resolve() : new Promise(r=>{ img.onload = img.onerror = r; })));
    }

    async function generatePDF(){
      const btn = document.getElementById('download-resume');
      const actions = document.querySelector('.actions');
      try{
        btn.setAttribute('disabled','');
        const origText = btn.textContent;
        btn.textContent = 'Generating PDF…';

        const paper = document.getElementById('paper');
        // ensure fonts and images are loaded
        if(document.fonts && document.fonts.ready) await document.fonts.ready;
        await waitForImages(paper);

        // hide UI actions while rendering
        const prevDisplay = actions.style.display;
        actions.style.display = 'none';

        // filename
        const name = (document.getElementById('name')?.textContent || 'resume').replace(/\s+/g,'_');
        const filename = `${name}_Resume.pdf`;

        // options for html2pdf
        const opt = {
          margin: [10,10,10,10],
          filename: filename,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, logging: false },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // html2pdf will automatically prompt download
        if(typeof html2pdf === 'undefined'){
          // load the bundle dynamically if not present
          await new Promise((resolve,reject)=>{
            const s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js';
            s.crossOrigin = 'anonymous';
            s.onload = resolve; s.onerror = reject; document.body.appendChild(s);
          });
        }

        await html2pdf().set(opt).from(paper).save();

        // restore UI
        actions.style.display = prevDisplay;
        btn.textContent = origText;
        btn.removeAttribute('disabled');
      }catch(err){
        console.error('PDF generation failed', err);
        try{ document.querySelector('.actions').style.display = ''; }catch(e){}
        const btn = document.getElementById('download-resume');
        if(btn){ btn.removeAttribute('disabled'); btn.textContent = 'Download PDF'; }
        alert('Failed to generate PDF: ' + (err && err.message || err));
      }
    }

    document.getElementById('download-resume').addEventListener('click', function(e){
      e.preventDefault();
      generatePDF();
    });
  </script>

  <!-- html2pdf bundle (used as fallback; dynamic loader above will also load if missing) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>

<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Resume — JSON Resume</title>
  <link rel="stylesheet" href="css/output.css" />
  <style>
    :root{--bg:#fff;--text:#0b1117;--muted:#5f6b75;--accent:#0f172a}
    [data-theme="dark"]{--bg:#0b0c0d;--text:#eef0ee;--muted:#9aa4ad;--accent:#f59e0b}
    html,body{height:100%}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;color:var(--text);background:var(--bg);}
    .wrap{max-width:980px;margin:36px auto;padding:28px;background:color-mix(in srgb,var(--bg) 96%, transparent);border:1px solid rgba(0,0,0,0.06);border-radius:6px}
    .row{display:flex;gap:18px}
    .col-left{width:34%;padding-right:12px;border-right:1px solid rgba(0,0,0,0.06)}
    .col-right{flex:1;padding-left:18px}
    .avatar{width:100%;border-radius:6px;display:block}
    h1{font-size:26px;margin:0 0 6px}
    h2{font-size:14px;margin:8px 0;color:var(--muted);font-weight:700}
    .muted{color:var(--muted)}
    ul{margin:6px 0 12px 18px}
    .section{margin-bottom:16px}
    .skill-list{display:flex;flex-wrap:wrap;gap:6px}
    .chip{background:color-mix(in srgb,var(--accent) 6%, transparent);padding:6px 8px;border-radius:8px;font-size:13px;color:var(--muted)}
    .download{display:inline-flex;gap:8px;align-items:center;padding:10px 12px;border-radius:8px;background:var(--accent);color:#fff;text-decoration:none}
    .controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .meta{font-size:13px;color:var(--muted)}
    @media (max-width:880px){.row{flex-direction:column}.col-left{width:100%;border-right:none;border-bottom:1px solid rgba(0,0,0,0.06);padding-bottom:14px}.col-right{padding-left:0}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <div>
        <a id="download-resume" class="download" href="#" download>Download PDF</a>
      </div>
      <div class="meta">Built from JSON — <a href="/tusharneje-dev/data/resume.json" target="_blank">resume.json</a></div>
    </div>

    <div id="resume-root">
      <!-- rendered by JS -->
    </div>
  </div>

  <script>
    async function loadJSON(){
      const res = await fetch('data/resume.json');
      if(!res.ok) throw new Error('Failed to load resume.json');
      return res.json();
    }

    function el(tag, attrs={}, children=[]){
      const node = document.createElement(tag);
      for(const k in attrs){
        if(k==='html') node.innerHTML = attrs[k];
        else node.setAttribute(k, attrs[k]);
      }
      (Array.isArray(children)?children:[children]).forEach(c=>{ if(!c) return; if(typeof c==='string') node.appendChild(document.createTextNode(c)); else node.appendChild(c) });
      return node;
    }

    function buildResume(data){
      const root = el('div', {class:'row'});
      const left = el('aside',{class:'col-left'});
      const right = el('main',{class:'col-right'});

      // Left: avatar, contact, skills
      const avatar = el('img',{src:data.personal.avatar,alt:data.personal.name,class:'avatar'});
      left.appendChild(avatar);

      left.appendChild(el('h2',{},['Contact']));
      const contact = el('div',{},[]);
      contact.appendChild(el('div',{},[el('strong',{},[data.personal.name])]));
      contact.appendChild(el('div',{class:'muted'},[data.personal.title]));
      contact.appendChild(el('div',{class:'muted'},[data.personal.location]));
      contact.appendChild(el('div',{class:'muted'},[data.personal.phone]));
      contact.appendChild(el('div',{class:'muted'},[data.personal.email]));
      left.appendChild(contact);

      left.appendChild(el('div',{class:'section'},[el('h2',{},['Skills'])]));
      const skillWrap = el('div',{class:'skill-list'});
      (data.skills.categories||[]).forEach(cat=>{
        cat.skills.slice(0,8).forEach(s=>{
          skillWrap.appendChild(el('div',{class:'chip'},[s.name]));
        });
      });
      left.appendChild(skillWrap);

      // Right: name + intro + sections
      const header = el('div',{},[]);
      header.appendChild(el('h1',{},[data.personal.name]));
      header.appendChild(el('div',{class:'muted'},[data.personal.title + ' — ' + data.personal.tagline]));
      header.appendChild(el('div',{style:'margin-top:10px'},[el('a',{id:'view-pdf',href:data.personal.resume,target:'_blank'},['View original PDF'])]));

      right.appendChild(header);

      // Summary
      right.appendChild(el('div',{class:'section'},[el('h2',{},['Summary']), el('p',{class:'muted',html:data.personal.bio})]));

      // Experience
      const expSec = el('div',{class:'section'});
      expSec.appendChild(el('h2',{},['Experience / Education']));
      const eduList = el('div',{},[]);
      (data.experience.education||[]).forEach(e=>{
        const item = el('div',{},[]);
        item.appendChild(el('div',{style:'font-weight:700'},[e.degree + (e.field?(' — '+e.field):'')]));
        item.appendChild(el('div',{class:'muted'},[e.institution + ' • ' + e.period]));
        if(e.description) item.appendChild(el('div',{class:'muted'},[e.description]));
        eduList.appendChild(item);
      });
      expSec.appendChild(eduList);
      right.appendChild(expSec);

      // Projects
      const projSec = el('div',{class:'section'});
      projSec.appendChild(el('h2',{},['Projects']));
      const plist = el('div',{},[]);
      (data.projects||[]).slice(0,6).forEach(p=>{
        const pi = el('div',{},[]);
        pi.appendChild(el('div',{style:'font-weight:700'},[p.title]));
        pi.appendChild(el('div',{class:'muted'},[p.tag]));
        plist.appendChild(pi);
      });
      projSec.appendChild(plist);
      right.appendChild(projSec);

      // Certificates
      const certSec = el('div',{class:'section'});
      certSec.appendChild(el('h2',{},['Certificates']));
      const cwrap = el('div',{},[]);
      (data.certificates||[]).slice(0,12).forEach(c=>{
        cwrap.appendChild(el('div',{class:'muted'},[c.name + ' — ' + (c.issuer||'') ]));
      });
      certSec.appendChild(cwrap);
      right.appendChild(certSec);

      root.appendChild(left); root.appendChild(right);
      return root;
    }

    (async ()=>{
      try{
        const data = await loadJSON();
        const container = document.getElementById('resume-root');
        const node = buildResume(data);
        container.appendChild(node);

        // download link points to resume.pdf
        const dl = document.getElementById('download-resume');
        dl.href = data.personal.resume || 'assets/resume.pdf';

      }catch(err){
        document.getElementById('resume-root').innerHTML = '<div style="color:#c33">Failed to load resume.json — '+err.message+'</div>'
        console.error(err)
      }
    })();
  </script>
</body>
</html>

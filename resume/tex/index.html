<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume LaTeX Source</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0c0d;
      --surface: #121317;
      --surface2: #1a1d24;
      --surface3: #20242d;
      --border: rgba(255,255,255,0.09);
      --text: #f0ede8;
      --muted: #9a9aa0;
      --accent: #f59e0b;
      --accent-soft: rgba(245,158,11,0.14);
      --good: #22c55e;
      --bad: #ef4444;
    }

    [data-theme="light"] {
      --bg: #faf9f6;
      --surface: #f4f1ea;
      --surface2: #ece7de;
      --surface3: #e2dbcf;
      --border: rgba(0,0,0,0.08);
      --text: #171717;
      --muted: #626266;
      --accent: #d97706;
      --accent-soft: rgba(217,119,6,0.12);
      --good: #15803d;
      --bad: #dc2626;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 420px at 12% -8%, var(--accent-soft), transparent 62%),
        radial-gradient(640px 340px at 88% 0%, rgba(56,189,248,0.08), transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg));
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.35), transparent 88%);
      opacity: 0.4;
    }

    a { color: inherit; }
    button, input { font: inherit; }

    .page {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 48px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0 22px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      text-decoration: none;
      box-shadow: 0 20px 60px rgba(0,0,0,0.16);
    }

    .brand-mark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--accent);
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .brand-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.96rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn,
    .ghost-btn,
    .primary-btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .ghost-btn,
    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
    }

    .primary-btn {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .icon-btn:hover,
    .ghost-btn:hover,
    .primary-btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 55%, var(--border));
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: start;
      padding: 24px 0 32px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: linear-gradient(160deg, color-mix(in srgb, var(--surface) 90%, transparent), color-mix(in srgb, var(--surface2) 94%, transparent));
      box-shadow: 0 28px 100px rgba(0,0,0,0.2);
      overflow: hidden;
      padding: 20px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel-title {
      margin: 0;
      font-family: 'Syne', sans-serif;
      font-size: 1.06rem;
      letter-spacing: -0.03em;
    }

    .panel-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .tool-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--accent) 38%, var(--border));
      background: color-mix(in srgb, var(--accent) 11%, var(--surface2));
    }

    .output-box {
      margin-top: 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--surface2), var(--surface));
      padding: 14px;
      min-height: 114px;
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .output-label {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin: 0;
    }

    .output-value {
      margin: 0;
      word-break: break-word;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      max-height: 65vh;
      overflow-y: auto;
    }
    
    /* Scrollbar styling for pre block */
    .output-value::-webkit-scrollbar {
      width: 8px;
    }
    .output-value::-webkit-scrollbar-track {
      background: var(--surface2);
      border-radius: 4px;
    }
    .output-value::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    .output-value::-webkit-scrollbar-thumb:hover {
      background: color-mix(in srgb, var(--accent) 55%, var(--border));
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1160px);
        padding-top: 10px;
      }
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }
      .panel {
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="../../index.html" aria-label="Back to portfolio home">
        <span class="brand-mark">$</span>
        <span class="brand-copy">
          <span class="brand-title">Resume LaTeX</span>
          <span class="brand-subtitle">Source code viewer</span>
        </span>
      </a>
      <div class="toolbar">
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme" type="button">
          <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
          <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="hero">
      <section class="panel" aria-label="Source code">
        <div class="panel-head">
          <div>
            <p class="panel-title">Resume Source File</p>
            <p class="panel-note">resume.tex</p>
          </div>
          <span class="tool-badge">LaTeX</span>
        </div>

        <div class="output-box">
          <div class="output-header">
            <div class="output-label">Source Content</div>
            <button class="ghost-btn" id="copy-btn" type="button" style="padding: 6px 12px; font-size: 0.75rem;">
              <span>Copy</span>
              <svg id="icon-copy" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              <svg id="icon-check" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none; color: var(--good);">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </button>
          </div>
          <pre class="output-value" id="tex-content">Loading...</pre>
        </div>
      </section>
    </main>
  </div>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const iconSun = document.getElementById('icon-sun');
    const iconMoon = document.getElementById('icon-moon');
    const html = document.documentElement;

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('route36-theme', theme);
      iconSun.style.display = theme === 'dark' ? '' : 'none';
      iconMoon.style.display = theme === 'dark' ? 'none' : '';
    }

    applyTheme(localStorage.getItem('route36-theme') || 'dark');
    themeToggle.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    const texContent = document.getElementById('tex-content');
    const copyBtn = document.getElementById('copy-btn');
    const iconCopy = document.getElementById('icon-copy');
    const iconCheck = document.getElementById('icon-check');
    const copyBtnText = copyBtn.querySelector('span');
    
    // Fetch the .tex file content
    fetch('./resume.tex')
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        return response.text();
      })
      .then(text => {
        texContent.textContent = text;
      })
      .catch(error => {
        console.error('Error fetching the TeX file:', error);
        texContent.textContent = 'Failed to load resume.tex. Ensure the file exists and is accessible.';
        texContent.style.color = 'var(--bad)';
      });

    // Copy to clipboard functionality
    copyBtn.addEventListener('click', async () => {
      try {
        const textToCopy = texContent.textContent;
        await navigator.clipboard.writeText(textToCopy);
        
        // Show success state
        iconCopy.style.display = 'none';
        iconCheck.style.display = 'inline-block';
        copyBtnText.textContent = 'Copied!';
        
        // Reset after 2 seconds
        setTimeout(() => {
          iconCopy.style.display = 'inline-block';
          iconCheck.style.display = 'none';
          copyBtnText.textContent = 'Copy';
        }, 2000);
      } catch (err) {
        console.error('Failed to copy text: ', err);
        copyBtnText.textContent = 'Error';
        setTimeout(() => {
          copyBtnText.textContent = 'Copy';
        }, 2000);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0c0c0d;
        }

        embed {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Floating compile button */
        .fab-compile {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 1000;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 22px;
            border-radius: 999px;
            background: #f59e0b;
            color: #000;
            font-family: 'Syne', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            box-shadow:
                0 0 0 0 rgba(245,158,11,0.55),
                0 12px 40px rgba(245,158,11,0.35);
            animation: fab-pulse 2.4s ease-in-out infinite;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: -0.01em;
        }

        .fab-compile:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow:
                0 0 0 0 rgba(245,158,11,0.7),
                0 18px 50px rgba(245,158,11,0.45);
            animation: none;
        }

        .fab-compile:active {
            transform: scale(0.97);
        }

        .fab-compile svg {
            flex-shrink: 0;
        }

        @keyframes fab-pulse {
            0%, 100% {
                box-shadow:
                    0 0 0 0 rgba(245,158,11,0.55),
                    0 12px 40px rgba(245,158,11,0.35);
            }
            50% {
                box-shadow:
                    0 0 0 10px rgba(245,158,11,0),
                    0 12px 40px rgba(245,158,11,0.35);
            }
        }
    </style>
</head>
<body>
    <embed src="resume.pdf" type="application/pdf" width="100%" height="100%" />

    <!-- Floating Compile Button -->
    <!-- <a class="fab-compile" href="/resume/tex/?compile=true" title="Compile resume.tex with LaTeX.js">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Compile Latest
    </a> -->
</body>
</html>
